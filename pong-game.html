<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        canvas { margin: auto; display: block; background: black; }\n        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }\n        h1 { color: white; text-align: center; }\n    </style>\n</head>\n<body>\n    <h1>Pong Game</h1>\n    <canvas id="pong" width="800" height="400"></canvas>\n\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballSize = 10;\n        let userPaddleY = (canvas.height / 2) - (paddleHeight / 2);\n        let computerPaddleY = (canvas.height / 2) - (paddleHeight / 2);\n        let ballX = canvas.width / 2;\n        let ballY = canvas.height / 2;\n        let ballSpeedX = 5;\n        let ballSpeedY = 3;\n        let userScore = 0;\n        let computerScore = 0;\n\n        function draw() {\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            context.fillStyle = 'white';\n            context.fillRect(0, userPaddleY, paddleWidth, paddleHeight);\n            context.fillRect(canvas.width - paddleWidth, computerPaddleY, paddleWidth, paddleHeight);\n            context.fillRect(ballX, ballY, ballSize, ballSize);\n            context.fillText(`User: ${userScore}`, 50, 50);\n            context.fillText(`Computer: ${computerScore}`, canvas.width - 150, 50);\n        }\n\n        function update() {\n            ballX += ballSpeedX;\n            ballY += ballSpeedY;\n\n            // Ball collision with top and bottom walls\n            if (ballY <= 0 || ballY >= canvas.height) {\n                ballSpeedY = -ballSpeedY;\n            }\n\n            // Ball collision with paddles\n            if (ballX <= paddleWidth && ballY > userPaddleY && ballY < userPaddleY + paddleHeight) {\n                ballSpeedX = -ballSpeedX;            }\n            if (ballX >= canvas.width - paddleWidth - ballSize && ballY > computerPaddleY && ballY < computerPaddleY + paddleHeight) {\n                ballSpeedX = -ballSpeedX;            }\n\n            // Scoring\n            if (ballX < 0) {\n                computerScore++;\n                resetBall();\n            }\n            if (ballX > canvas.width) {\n                userScore++;\n                resetBall();\n            }\n\n            // Computer AI\n            if (computerPaddleY + (paddleHeight / 2) < ballY) {\n                computerPaddleY += 4;\n            } else {\n                computerPaddleY -= 4;\n            }\n\n            // Keep paddles in bounds\n            userPaddleY = Math.max(0, Math.min(userPaddleY, canvas.height - paddleHeight));\n            computerPaddleY = Math.max(0, Math.min(computerPaddleY, canvas.height - paddleHeight));\n        }\n\n        function resetBall() {\n            ballX = canvas.width / 2;\n            ballY = canvas.height / 2;\n            ballSpeedX = 5 * (Math.random() > 0.5 ? 1 : -1);\n            ballSpeedY = 3 * (Math.random() > 0.5 ? 1 : -1);\n        }\n\n        function gameLoop() {\n            draw();\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n\n        // Control paddle with mouse\n        canvas.addEventListener('mousemove', (event) => {\n            const rect = canvas.getBoundingClientRect();\n            userPaddleY = event.clientY - rect.top - paddleHeight / 2;\n        });\n\n        // Control paddle with arrow keys\n        window.addEventListener('keydown', (event) => {\n            if (event.key === 'ArrowUp') {\n                userPaddleY -= 20;\n            } else if (event.key === 'ArrowDown') {\n                userPaddleY += 20;\n            }\n        });\n\n        gameLoop();\n    </script>\n</body>\n</html>\n
